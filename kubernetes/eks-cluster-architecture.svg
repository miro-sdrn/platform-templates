<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">EKS Cluster Architecture</text>

  <!-- VPC border -->
  <rect x="30" y="60" width="840" height="510" fill="none" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="8,4" rx="8"/>
  <text x="50" y="82" font-size="13" fill="#8C4FFF" font-weight="bold">VPC</text>

  <!-- Control Plane -->
  <rect x="320" y="95" width="260" height="80" fill="#e8d5fb" stroke="#8C4FFF" stroke-width="2" rx="8"/>
  <text x="450" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#5a189a">EKS Control Plane</text>
  <text x="450" y="148" text-anchor="middle" font-size="11" fill="#5a189a">API Server · etcd · Scheduler</text>
  <text x="450" y="164" text-anchor="middle" font-size="10" fill="#7b2d8b">(AWS Managed)</text>

  <!-- Node Group 1 -->
  <rect x="60" y="230" width="220" height="150" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" rx="8"/>
  <text x="170" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Node Group: System</text>

  <rect x="80" y="265" width="80" height="50" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="120" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e3a8a">Node 1</text>
  <text x="120" y="302" text-anchor="middle" font-size="9" fill="#1e3a8a">t3.medium</text>

  <rect x="180" y="265" width="80" height="50" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="220" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e3a8a">Node 2</text>
  <text x="220" y="302" text-anchor="middle" font-size="9" fill="#1e3a8a">t3.medium</text>

  <text x="170" y="345" text-anchor="middle" font-size="10" fill="#1d4ed8">CoreDNS · aws-lb-controller</text>
  <text x="170" y="362" text-anchor="middle" font-size="10" fill="#1d4ed8">cluster-autoscaler</text>

  <!-- Node Group 2 -->
  <rect x="340" y="230" width="220" height="150" fill="#dcfce7" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3" rx="8"/>
  <text x="450" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Node Group: App</text>

  <rect x="360" y="265" width="80" height="50" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5" rx="5"/>
  <text x="400" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Node 1</text>
  <text x="400" y="302" text-anchor="middle" font-size="9" fill="#14532d">m5.large</text>

  <rect x="460" y="265" width="80" height="50" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5" rx="5"/>
  <text x="500" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#14532d">Node 2</text>
  <text x="500" y="302" text-anchor="middle" font-size="9" fill="#14532d">m5.large</text>

  <text x="450" y="345" text-anchor="middle" font-size="10" fill="#15803d">App Pods · Services</text>
  <text x="450" y="362" text-anchor="middle" font-size="10" fill="#15803d">HPA · PodDisruptionBudget</text>

  <!-- Node Group 3 -->
  <rect x="620" y="230" width="220" height="150" fill="#fef9c3" stroke="#eab308" stroke-width="2" stroke-dasharray="5,3" rx="8"/>
  <text x="730" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">Node Group: Spot</text>

  <rect x="640" y="265" width="80" height="50" fill="#fef08a" stroke="#eab308" stroke-width="1.5" rx="5"/>
  <text x="680" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#713f12">Spot 1</text>
  <text x="680" y="302" text-anchor="middle" font-size="9" fill="#713f12">m5.xlarge</text>

  <rect x="740" y="265" width="80" height="50" fill="#fef08a" stroke="#eab308" stroke-width="1.5" rx="5"/>
  <text x="780" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#713f12">Spot 2</text>
  <text x="780" y="302" text-anchor="middle" font-size="9" fill="#713f12">m5.xlarge</text>

  <text x="730" y="345" text-anchor="middle" font-size="10" fill="#854d0e">Batch / Workers</text>
  <text x="730" y="362" text-anchor="middle" font-size="10" fill="#854d0e">Cost-optimized</text>

  <!-- ALB -->
  <rect x="180" y="440" width="140" height="50" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="8"/>
  <text x="250" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">ALB</text>
  <text x="250" y="478" text-anchor="middle" font-size="10" fill="#9d174d">Ingress Controller</text>

  <!-- ECR -->
  <rect x="380" y="440" width="140" height="50" fill="#ffe4e6" stroke="#f43f5e" stroke-width="2" rx="8"/>
  <text x="450" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#9f1239">ECR</text>
  <text x="450" y="478" text-anchor="middle" font-size="10" fill="#9f1239">Container Registry</text>

  <!-- Secrets Manager -->
  <rect x="580" y="440" width="140" height="50" fill="#ffedd5" stroke="#f97316" stroke-width="2" rx="8"/>
  <text x="650" y="461" text-anchor="middle" font-size="12" font-weight="bold" fill="#c2410c">Secrets Manager</text>
  <text x="650" y="478" text-anchor="middle" font-size="10" fill="#c2410c">ESO integration</text>

  <!-- Internet -->
  <rect x="370" y="530" width="160" height="40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" rx="8"/>
  <text x="450" y="555" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">Internet / Users</text>

  <!-- Arrows: Control Plane to Node Groups -->
  <line x1="370" y1="175" x2="200" y2="230" stroke="#8C4FFF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="175" x2="450" y2="230" stroke="#8C4FFF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="175" x2="700" y2="230" stroke="#8C4FFF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Internet to ALB -->
  <line x1="430" y1="530" x2="290" y2="490" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: ALB to App nodes -->
  <line x1="320" y1="465" x2="360" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
  </defs>

</svg>
